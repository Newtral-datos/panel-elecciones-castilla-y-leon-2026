<style>
  /* === ESTILOS COMPARTIDOS === */
  .dw-wrapper {
    background-color: #f8f9fa;
    border-radius: 30px;
    padding: 15px;
    margin: 30px auto;
    overflow: visible;
    position: relative;
    box-sizing: border-box;
  }
  .dw-wrapper .charts-grid {
    display: grid;
    gap: 15px;
  }
  .dw-wrapper .chart-cell {
    min-width: 0;
    display: flex;
  }
  .dw-wrapper iframe {
    width: 100% !important;
    border: none !important;
    margin: 0 !important;
    display: block;
    overflow: hidden;
  }

  /* === VARIANTES DE CADA CONTENEDOR === */

  /* Contenedor 1: borde superior, 2 columnas, alinea abajo, ancho 90% */
  .dw-w1 {
    max-width: 90%;
    border-top: 5px solid #01f3b3;
  }
  .dw-w1 .charts-grid {
    grid-template-columns: repeat(2, 1fr);
    align-items: end;
  }
  .dw-w1 .chart-cell { align-items: flex-end; }

  /* Contenedor 2: sin borde, 1 columna, ancho 80% */
  .dw-w2 {
    max-width: 80%;
  }
  .dw-w2 .charts-grid {
    grid-template-columns: repeat(1, 1fr);
  }

  /* Contenedor 3: borde inferior, 2 columnas, ancho 90% */
  .dw-w3 {
    max-width: 90%;
    border-bottom: 5px solid #01f3b3;
  }
  .dw-w3 .charts-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  /* Contenedor 4: borde arriba y abajo, 2 columnas, alinea centro, ancho 80% */
  .dw-w4 {
    max-width: 80%;
    border-top: 5px solid #01f3b3;
    border-bottom: 5px solid #01f3b3;
  }
  .dw-w4 .charts-grid {
    grid-template-columns: repeat(2, 1fr);
    align-items: center;
  }
  .dw-w4 .chart-cell { align-items: center; }

  /* === RESPONSIVE: una columna en móvil === */
  @media (max-width: 650px) {
    .dw-wrapper .charts-grid {
      grid-template-columns: 1fr !important;
    }
  }
</style>

<!-- ==================== CONTENEDOR 1 ==================== -->
<!-- Hemiciclo + Tabla escaños | borde superior | 2 col | alinea abajo -->
<div class="dw-wrapper dw-w1">
  <div class="charts-grid">
    <div class="chart-cell">
      <iframe title="Diputados hemiciclo" aria-label="Hemiciclo"
        id="datawrapper-chart-YKlJt" src="https://datawrapper.dwcdn.net/YKlJt/1/"
        scrolling="no" frameborder="0"
        style="width: 0; min-width: 100% !important; border: none;"
        height="467" data-external="1"></iframe>
    </div>
    <div class="chart-cell">
      <iframe title="Tabla comparación porcentaje y escaños" aria-label="Tabla"
        id="datawrapper-chart-IJ6Y6" src="https://datawrapper.dwcdn.net/IJ6Y6/1/"
        scrolling="no" frameborder="0"
        style="width: 0; min-width: 100% !important; border: none;"
        height="467" data-external="1"></iframe>
    </div>
  </div>
</div>

<!-- ==================== SCRIPT ÚNICO ==================== -->
<script type="text/javascript">
  window.addEventListener("message", function(a) {
    if (void 0 !== a.data["datawrapper-height"]) {
      var e = document.querySelectorAll("iframe");
      for (var t in a.data["datawrapper-height"])
        for (var r, i = 0; r = e[i]; i++)
          if (r.contentWindow === a.source) {
            r.style.height = a.data["datawrapper-height"][t] + "px";
          }
    }
  });
</script>
